name: Scoperta catalogo Pokémon (harvest CardRush)

# Scopre carte/set NUOVI e rinfresca catalogo + prezzi CardRush via l'endpoint-LISTA.
# ATTENZIONE: la lista CardRush (model_number vuoto) da' 403 dagli IP datacenter di GitHub
# ANCHE in forma SPA completa -> da CI funziona SOLO via PROXY residenziale (secret
# SCRAPER_PROXY). Per questo il trigger e' SOLO MANUALE (workflow_dispatch): senza proxy il
# job uscirebbe 2 (CI). Quando imposti SCRAPER_PROXY puoi rimettere un cron mensile.
# In alternativa la scoperta si fa dal PC (scripts/harvest_local.bat). I PREZZI per-carta
# (job notturno scrape.yml) NON dipendono da questo: girano in cloud senza proxy.
on:
  workflow_dispatch:

permissions:
  contents: write

# stesso gruppo del job prezzi: non sovrapporre due scritture sul DB
concurrency:
  group: scrape
  cancel-in-progress: false

env:
  CI: "true"
  SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (include lo storico committato)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Crea il DB se manca (storico preservato se gia' presente)
        run: python src/init_db.py

      # Harvest catalogo + prezzi CardRush (lista in forma SPA). Se la lista da' 403,
      # run.py esce con codice 2 (CI=true) -> job rosso + notifica.
      - name: Harvest catalogo Pokémon (lista CardRush forma SPA)
        run: python src/run.py --harvest-pokemon

      - name: Commit dei dati aggiornati
        run: |
          git config user.name  "tcg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add tcg_tracker.db dashboard/data/*.json dashboard/buylist_live.json
          if git diff --staged --quiet; then
            echo "Nessuna variazione da committare."
          else
            git commit -m "chore: catalogo+prezzi CardRush $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
