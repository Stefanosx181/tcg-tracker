name: Aggiorna prezzi TCG (Hareruya, cloud)

# COSA FA IN CLOUD: solo i prezzi HARERUYA dei Pokémon, in lotti per STALENESS.
#   Perche': dagli IP datacenter di GitHub Actions, l'endpoint-LISTA di CardRush
#   (l'harvest del catalogo) e le fonti OP/YGO (Yuyu-tei, Toretoku) rispondono
#   403 Forbidden. Hareruya invece risponde regolarmente. Quindi:
#     - HARERUYA per-carta  -> gira QUI in cloud (funziona);
#     - CATALOGO + prezzi CardRush + immagini -> si fanno dal PC con
#       `python src/run.py --harvest-pokemon` (vedi DEPLOY.md / scripts/harvest_local.bat),
#       perche' la lista CardRush blocca gli IP cloud.
#
#   PIU' TRIGGER nella stessa notte (4 x 2800 = 11.200 >= ~10k carte): i lotti si
#   dividono il catalogo per staleness (carte col prezzo Hareruya piu' vecchio/mai)
#   senza sovrapporsi, coprendolo in una notte. Jitter + gap tra set = traffico credibile.
on:
  schedule:
    - cron: "0 22 * * *"
    - cron: "30 23 * * *"
    - cron: "0 1 * * *"
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Carte Hareruya per lotto"
        default: "2800"

# serve per ricommittare il DB e i JSON aggiornati nel repo
permissions:
  contents: write

# evita run sovrapposti: i trigger notturni si mettono in coda, non si annullano
concurrency:
  group: scrape
  cancel-in-progress: false

env:
  HARERUYA_BATCH: ${{ github.event.inputs.batch || '2800' }}

jobs:
  hareruya:
    runs-on: ubuntu-latest
    timeout-minutes: 350          # sotto il limite duro di 360' per job
    steps:
      - name: Checkout (include lo storico committato)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Crea il DB se manca (storico preservato se gia' presente)
        run: python src/init_db.py

      # Lotto Hareruya per staleness. Il CATALOGO (quali carte esistono) e i prezzi
      # CardRush arrivano dal PC: qui aggiorniamo solo Hareruya sulle carte gia' nel DB.
      # Se Hareruya dovesse bloccare (0 prezzi su un lotto ampio), run.py esce con
      # errore -> il job fallisce e arriva la notifica (segnale di rottura reale).
      - name: Lotto Hareruya per staleness (jitter + gap tra set = credibile)
        run: >
          python src/run.py --game pokemon --only hareruya
          --batch ${{ env.HARERUYA_BATCH }} --sleep 1.0 --jitter 1.5 --set-gap 8

      - name: Commit dei dati aggiornati
        run: |
          git config user.name  "tcg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add tcg_tracker.db dashboard/data/*.json dashboard/buylist_live.json
          if git diff --staged --quiet; then
            echo "Nessuna variazione da committare."
          else
            git commit -m "chore: prezzi Hareruya $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
