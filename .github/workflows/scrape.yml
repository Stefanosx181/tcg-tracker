name: Aggiorna prezzi TCG (cloud)

# Aggiornamento AUTOMATICO una volta a SETTIMANA: in UNA notte copre l'INTERO catalogo
# Pokémon (CardRush + Hareruya, per-carta). Per NON stressare Hareruya il giro e'
# SPEZZATO in 4 finestre scaglionate nella notte (lotti per STALENESS): ogni trigger
# prende le ~2.600 carte col prezzo piu' VECCHIO per fonte -> 4 x 2.600 = 10.400 >= 10.191,
# cioe' l'intero catalogo, ma distribuito su ~9h invece che in un'unica raffica.
#   Funziona dal cloud perche' CardRush PER-CARTA (forma SPA) e Hareruya passano dagli IP
#   di GitHub; la LISTA (scoperta carte nuove) resta a parte (discovery.yml, via proxy/PC).
#   Pacing credibile: --sleep 1 + --jitter + --set-gap. Repo PUBBLICO = minuti illimitati.
#   Aggiornamento SOLO automatico: nessun bottone/endpoint on-demand.
on:
  # Orari pensati in ORA ITALIANA: notte di domenica → lunedì (22:00, 01:00, 04:00, 07:00
  # locali). GitHub Actions usa SOLO UTC e NON segue l'ora legale, quindi i valori sotto sono
  # tarati su CEST (estate, UTC+2): da fine ottobre (CET, UTC+1) le finestre slittano 1h
  # prima in locale — resta comunque notte fonda, effetto trascurabile.
  schedule:
    - cron: "0 20 * * 0"    # dom 20:00 UTC = dom 22:00 IT (1a finestra)
    - cron: "0 23 * * 0"    # dom 23:00 UTC = lun 01:00 IT (2a)
    - cron: "0 2 * * 1"     # lun 02:00 UTC = lun 04:00 IT (3a)
    - cron: "0 5 * * 1"     # lun 05:00 UTC = lun 07:00 IT (4a)
  workflow_dispatch:
    inputs:
      batch:
        description: "Carte per lotto, per fonte"
        default: "2600"
      sources:
        description: "Quali fonti: both | cardrush | hareruya (per re-scrape mirate)"
        default: "both"
      set:
        description: "Solo questo set (es. SV2a) - per test/re-scrape mirate. Vuoto = tutto"
        default: ""
      limit:
        description: "Max carte (solo con 'set', per test rapidi)"
        default: "50"

# serve per ricommittare il DB e i JSON aggiornati nel repo
permissions:
  contents: write

# UN solo gruppo: le 4 finestre si ACCODANO (mai in parallelo). Il .db e' binario:
# serializzare evita conflitti di push tra run.
concurrency:
  group: scrape
  cancel-in-progress: false

env:
  BATCH: ${{ github.event.inputs.batch || '2600' }}

jobs:
  prezzi:
    runs-on: ubuntu-latest
    timeout-minutes: 300          # < cap duro 360'; un lotto reale gira ~2.5-3h
    steps:
      - name: Checkout (include lo storico committato)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Crea il DB se manca (storico preservato se gia' presente)
        run: python src/init_db.py

      # CardRush PER-CARTA (forma SPA, NON la lista 403). Se bloccasse anche il per-carta
      # (errori rete su >=50% del lotto) run.py esce con errore -> notifica.
      # 'sources' (workflow_dispatch) permette re-scrape mirate: una sola fonte.
      # Schedule/altri eventi -> input vuoto -> entrambe le fonti girano.
      - name: Lotto CardRush per-carta per staleness
        if: ${{ github.event.inputs.sources != 'hareruya' }}
        run: >
          python src/run.py --game pokemon --only cardrush
          --batch ${{ env.BATCH }} --sleep 1.0 --jitter 0.6 --set-gap 2

      # Hareruya: modalita' PAGINA-SET (default, veloce). Con 'set' -> solo quel set
      # (test/re-scrape mirate); altrimenti lotto per STALENESS (--batch).
      - name: Lotto Hareruya
        if: ${{ github.event.inputs.sources != 'cardrush' }}
        run: |
          if [ -n "${{ github.event.inputs.set }}" ]; then
            python src/run.py --game pokemon --only hareruya \
              --set "${{ github.event.inputs.set }}" --limit "${{ github.event.inputs.limit || '50' }}" \
              --sleep 1.0 --jitter 0.6 --set-gap 2
          else
            python src/run.py --game pokemon --only hareruya \
              --batch ${{ env.BATCH }} --sleep 1.0 --jitter 0.6 --set-gap 2
          fi

      - name: Commit dei dati aggiornati
        run: |
          git config user.name  "tcg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add tcg_tracker.db dashboard/data/*.json dashboard/buylist_live.json
          if git diff --staged --quiet; then
            echo "Nessuna variazione da committare."
          else
            git commit -m "chore: prezzi CR+HR $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
