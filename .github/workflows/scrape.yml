name: Aggiorna prezzi TCG (cloud)

# COSA FA IN CLOUD: rinfresca i PREZZI Pokémon PER-CARTA — sia CardRush sia Hareruya —
# in lotti per STALENESS (le carte col prezzo piu' vecchio/mai aggiornato vanno prima).
#   Perche' funziona dal cloud: dagli IP datacenter di GitHub Actions il blocco di CardRush
#   e' una REGOLA DI PERCORSO, non un ban d'IP — l'endpoint PER-CARTA
#   (`/pokemon/buying_prices?model_number=...`) passa, e' solo l'endpoint-LISTA (la scansione
#   del catalogo) a dare 403. Hareruya passa regolarmente. Quindi qui aggiorniamo i PREZZI
#   per-carta senza mai toccare la lista.
#   Cosa NON si fa qui (richiede la lista, 403 in cloud): la SCOPERTA di carte/set NUOVI e il
#   refresh OP/YGO -> job separato `harvest_local.bat` dal PC (vedi DEPLOY.md), a bassa frequenza.
#
#   PIU' TRIGGER nella stessa notte: i lotti si dividono il catalogo per staleness senza
#   sovrapporsi. Jitter + gap tra set = traffico credibile.
on:
  # 1 trigger/notte con lotto contenuto: sta nei 2.000 min/mese gratis del repo PRIVATO
  # (full catalogo ~10k coperto in ~10 notti per fonte; i buyback non cambiano a ore).
  # Per copertura PIENA ogni notte -> repo PUBBLICO (minuti illimitati): alza batch e
  # rimetti piu' trigger.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Carte per lotto (vale sia per CardRush sia per Hareruya)"
        default: "900"

# serve per ricommittare il DB e i JSON aggiornati nel repo
permissions:
  contents: write

# evita run sovrapposti: i trigger notturni si mettono in coda, non si annullano
concurrency:
  group: scrape
  cancel-in-progress: false

env:
  BATCH: ${{ github.event.inputs.batch || '900' }}

jobs:
  prezzi:
    runs-on: ubuntu-latest
    timeout-minutes: 350          # sotto il limite duro di 360' per job
    steps:
      - name: Checkout (include lo storico committato)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Crea il DB se manca (storico preservato se gia' presente)
        run: python src/init_db.py

      # CardRush PER-CARTA (usa tcg_card.cardrush_url ?model_number=..., NON la lista 403).
      # Se CardRush bloccasse anche il per-carta (0 prezzi su >=30 tentativi), run.py esce
      # con errore e il job fallisce -> notifica (segnale di rottura reale).
      - name: Lotto CardRush per-carta per staleness
        run: >
          python src/run.py --game pokemon --only cardrush
          --batch ${{ env.BATCH }} --sleep 1.0 --jitter 0.6 --set-gap 2

      # Hareruya per-carta, per staleness (indipendente: sceglie le sue carte piu' stantie).
      - name: Lotto Hareruya per-carta per staleness
        run: >
          python src/run.py --game pokemon --only hareruya
          --batch ${{ env.BATCH }} --sleep 1.0 --jitter 0.6 --set-gap 2

      - name: Commit dei dati aggiornati
        run: |
          git config user.name  "tcg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add tcg_tracker.db dashboard/data/*.json dashboard/buylist_live.json
          if git diff --staged --quiet; then
            echo "Nessuna variazione da committare."
          else
            git commit -m "chore: prezzi CR+HR $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
