<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>TCG Tracker — Buying Prices</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{ --bg:#0f1320; --card:#161b2c; --card2:#1b2236; --line:#27304a; --txt:#e6e9f2;
         --muted:#8b94ad; --cr:#5aa9ff; --hr:#ff8a5a; --yt:#c08af5; --best:#3ddc97; --stale:#d9b36b; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--txt);font-size:14px;
       -webkit-text-size-adjust:100%;text-size-adjust:100%}

  header{padding:16px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;
         background:rgba(15,19,32,.95);backdrop-filter:blur(6px);z-index:30}
  .topline{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  h1{font-size:18px;margin:0}
  .updated{color:var(--muted);font-size:12px}
  .grand{font-size:13px;margin-left:auto}
  .grand b{color:var(--cr)} .grand .hr{color:var(--hr)}
  .note{color:var(--muted);font-size:11px;margin-top:6px}
  .logout{color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--line);
          padding:4px 10px;border-radius:8px}
  .logout:hover{color:var(--txt);border-color:#3a4a6e}
  .mk{color:var(--stale);cursor:help}

  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  input,select,button{background:var(--card);color:var(--txt);border:1px solid var(--line);
       border-radius:9px;padding:9px 11px;font-size:14px}
  input{min-width:240px}
  button#refreshBtn{cursor:pointer;background:#1d3a5f;border-color:#2c5a8f;color:#cfe4ff}
  button#refreshBtn:hover:not(:disabled){background:#234a78}
  button#refreshBtn:disabled{opacity:.6;cursor:default}
  #refreshMsg{align-self:center;font-size:12px;color:var(--muted)}

  /* schede per gioco */
  .game-tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .gtab{background:var(--card);color:var(--muted);border:1px solid var(--line);
        border-radius:10px;padding:8px 18px;font-size:14px;cursor:pointer;font-weight:600}
  .gtab:hover{color:var(--txt);border-color:#3a4a6e}
  .gtab.on{background:#23314d;color:#cfe4ff;border-color:#3a4a6e}

  .wrap{padding:8px 22px 60px;max-width:1500px;margin:0 auto}

  /* intestazione set */
  .set-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
            margin:26px 0 12px;padding:12px 16px;background:var(--card2);
            border:1px solid var(--line);border-radius:12px;cursor:pointer}
  .set-head h2{font-size:16px;margin:0}
  .set-head .count{color:var(--muted);font-size:12px}
  .set-tot{margin-left:auto;display:flex;gap:22px;font-size:13px;font-variant-numeric:tabular-nums}
  .set-tot .lbl{color:var(--muted);font-size:11px;display:block}
  .set-tot .cr{color:var(--cr);font-weight:700} .set-tot .hr{color:var(--hr);font-weight:700}
  .set-tot .yt{color:var(--yt);font-weight:700}
  .caret{color:var(--muted);font-size:13px;width:14px}

  /* griglia card */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:14px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:12px;
        overflow:hidden;cursor:pointer;transition:transform .08s,border-color .08s;display:flex;flex-direction:column}
  .tile:hover{transform:translateY(-2px);border-color:#3a4a6e}
  .tile .imgbox{background:#0a0d16;display:flex;align-items:center;justify-content:center;
                padding:10px;aspect-ratio:3/4}
  .tile img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .tile .body{padding:10px 12px 12px}
  .tile .nm{font-size:13px;line-height:1.25;height:2.5em;overflow:hidden;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .tile .meta{display:flex;align-items:center;gap:8px;margin:6px 0 9px}
  .tile .code{color:var(--muted);font-size:11px}
  .rar{font-size:10px;padding:1px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .prices{display:grid;grid-template-columns:1fr;gap:6px}
  .prow{display:flex;align-items:center;gap:7px;font-size:13px;font-variant-numeric:tabular-nums}
  .prow .tag{font-size:10px;font-weight:700;width:24px}
  .prow .tag.cr{color:var(--cr)} .prow .tag.hr{color:var(--hr)} .prow .tag.yt{color:var(--yt)}
  .prow .val{font-weight:600}
  .prow .w{color:var(--muted);font-size:11px;margin-left:auto}
  .prow.stale .val{font-style:italic;color:var(--stale)}
  .bar{height:4px;border-radius:3px;background:#0a0d16;overflow:hidden;margin-top:3px}
  .bar i{display:block;height:100%}
  .bar i.cr{background:var(--cr)} .bar i.hr{background:var(--hr)} .bar i.yt{background:var(--yt)}
  .empty{padding:50px;text-align:center;color:var(--muted)}

  /* modal grafico */
  .modal{position:fixed;inset:0;background:rgba(5,8,15,.78);display:none;
         align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .sheet{background:var(--card);border:1px solid var(--line);border-radius:14px;
         width:min(680px,96vw);max-height:92vh;overflow:auto;padding:18px}
  .sheet .hd{display:flex;gap:14px;align-items:center;margin-bottom:12px}
  .sheet .hd img{width:64px;height:88px;object-fit:contain;background:#0a0d16;border-radius:6px}
  .sheet .hd h3{margin:0 0 3px;font-size:15px}
  .sheet .hd .sub{color:var(--muted);font-size:12px}
  .sheet .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:none;background:none}
  .idxbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;
          padding:3px 9px;cursor:pointer;font-size:13px;line-height:1}
  .idxbtn:hover{color:var(--txt);border-color:#3a4a6e}
  #globalIdxBtn{cursor:pointer;background:#23314d;border-color:#3a4a6e;color:#cfe4ff}
  .toggle{margin-left:auto;background:#1d3a5f;border:1px solid #2c5a8f;color:#cfe4ff;
          border-radius:8px;padding:5px 11px;cursor:pointer;font-size:12px}
  .toggle:hover{background:#234a78}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin:2px 0 8px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .chart-box{height:260px}

  /* ---------- RESPONSIVE ---------- */
  /* tablet */
  @media (max-width: 900px){
    .wrap{padding:6px 14px 50px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  }
  /* mobile */
  @media (max-width: 640px){
    header{padding:12px 14px}
    h1{font-size:16px}
    .topline{gap:10px}
    .grand{margin-left:0;flex-basis:100%}
    .controls{gap:8px}
    .controls input{flex:1 1 100%;min-width:0}
    .controls select{flex:1 1 46%}
    #refreshBtn{flex:1 1 46%}
    #refreshMsg{flex-basis:100%}
    .wrap{padding:4px 12px 50px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
    .set-head{margin:16px 0 10px;padding:10px 12px}
    .set-head h2{font-size:15px}
    .set-tot{margin-left:0;flex-basis:100%;gap:20px}
    .tile .nm{font-size:12px}
    .prow{font-size:12px}
    .modal{padding:10px}
    .sheet{width:100%;padding:14px}
    .chart-box{height:240px}
  }
  /* telefoni stretti: 2 colonne garantite */
  @media (max-width: 380px){
    .grid{grid-template-columns:repeat(2,1fr);gap:8px}
    .tile .body{padding:8px 9px 10px}
    .tile .imgbox{padding:7px}
  }
</style>
</head>
<body>
<header>
  <div class="topline">
    <h1>TCG Tracker</h1>
    <span class="updated" id="updated"></span>
    <span class="grand" id="grand"></span>
    <a href="https://tcgtracker.cloudflareaccess.com/cdn-cgi/access/logout" class="logout" title="Esci da Access">Esci</a>
  </div>
  <div class="note"><span class="mk">*</span> prezzo riportato dall'ultimo valore noto (manuale o non confermato nell'ultimo aggiornamento)</div>
  <div class="game-tabs" id="gameTabs"></div>
  <div class="controls">
    <input id="search" placeholder="Cerca carta o codice…" autocomplete="off">
    <select id="setFilter"><option value="">Tutti i set</option></select>
    <button id="globalIdxBtn" title="Andamento del prezzo medio ponderato di tutti i set">📈 Andamento</button>
    <button id="refreshBtn" title="Avvia subito lo scraping dei prezzi">↻ Aggiorna ora</button>
    <span id="refreshMsg"></span>
  </div>
</header>

<div class="wrap">
  <div id="sets"></div>
  <div class="empty" id="empty" hidden>Nessuna carta corrisponde ai filtri.</div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="hd">
      <img id="mImg" alt="">
      <div><h3 id="mName"></h3><div class="sub" id="mSub"></div></div>
      <button class="toggle" id="mToggle" hidden>Indice 100</button>
      <button class="x" id="mClose">×</button>
    </div>
    <div class="legend" id="mLegend"></div>
    <div class="chart-box"><canvas id="mCanvas"></canvas></div>
  </div>
</div>

<script>
const YEN = n => (n==null||n===0) ? "—" : "¥" + Number(n).toLocaleString("ja-JP");
const PCT = n => (n==null) ? "—" : n.toFixed(1) + "%";
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
let DATA=[], HIST={}, SETS=[], collapsed=new Set(), chart=null;
let SETIDX={sets:{},global:{}}, idxNormalize=false, idxName=null;
let activeGame=null;

// Giochi: ogni gioco ha la sua pagina (scheda). Ordine fisso, nomi leggibili.
const GAME_ORDER = ["pokemon","onepiece","yugioh"];
const GAME_META = { pokemon:{name:"Pokémon"}, onepiece:{name:"One Piece"}, yugioh:{name:"Yu-Gi-Oh"} };
const gamesPresent = ()=>{ const have=new Set(SETS.map(s=>s.game).filter(Boolean));
  return [...GAME_ORDER.filter(g=>have.has(g)), ...[...have].filter(g=>!GAME_ORDER.includes(g))]; };
const qval = ()=>document.getElementById("search").value.trim().toLowerCase();
const setFilter = ()=>document.getElementById("setFilter").value;
const imgSrc = c => `images/${c.pack_code}_${c.model_number}.webp`;

// Fonti generiche: ogni gioco usa la sua coppia (Pokémon=cardrush+hareruya,
// One Piece=cardrush+yuyutei...). La dashboard si adatta alle fonti presenti.
const SRC_ORDER = ["cardrush","hareruya","yuyutei"];
const SRC_META = {
  cardrush:{tag:"CR",cls:"cr",name:"CardRush",color:"#5aa9ff"},
  hareruya:{tag:"HR",cls:"hr",name:"Hareruya",color:"#ff8a5a"},
  yuyutei:{tag:"YT",cls:"yt",name:"Yuyu-tei",color:"#c08af5"},
};
// Tollerante a DUE schemi: multi-fonte c.prices{src:{price,stock}} (dati deployati su
// Cloudflare) e legacy piatto c.cardrush_price/c.cardrush_stock (snapshot locale finche'
// il DB e' v1). Su Cloudflare legge prices{} -> comportamento INVARIATO; in locale mostra
// i prezzi dai campi piatti -> localhost identico al sito.
const priceOf = (c,s)=> (c.prices && c.prices[s]) ? c.prices[s].price : (c[s+"_price"] ?? null);
const stockOf = (c,s)=> (c.prices && c.prices[s]) ? c.prices[s].stock : (c[s+"_stock"] ?? null);
const setSources = s =>{ const have=new Set();
  s.cards.forEach(c=>SRC_ORDER.forEach(x=>{ if(c.prices&&c.prices[x]) have.add(x); }));
  return SRC_ORDER.filter(x=>have.has(x)); };

async function load(){
  const [b,h,si] = await Promise.all([
    fetch("./data/buylist.json").then(r=>r.json()),
    fetch("./data/history.json").then(r=>r.json()).catch(()=>({series:{}})),
    fetch("./data/setindex.json").then(r=>r.json()).catch(()=>({sets:{},global:{}})),
  ]);
  DATA = b.rows||[]; HIST = h.series||{}; SETIDX = {sets:si.sets||{}, global:si.global||{}};
  document.getElementById("updated").textContent = "Aggiornato: " + (b.generated_at||"—");
  buildSets();
  activeGame = gamesPresent()[0] || null;     // di default il primo gioco (Pokémon)
  refreshForGame();
}

// Schede per gioco: una sola scheda visibile alla volta, niente giochi mescolati.
function buildGameTabs(){
  const el=document.getElementById("gameTabs"); el.innerHTML="";
  const games=gamesPresent();
  el.style.display = games.length>1 ? "flex" : "none";   // se c'e' un solo gioco, niente schede
  for(const g of games){
    const t=document.createElement("button");
    t.className="gtab"+(g===activeGame?" on":"");
    t.textContent=(GAME_META[g]||{}).name||g;
    t.onclick=()=>{ if(activeGame===g) return;
      activeGame=g; document.getElementById("setFilter").value=""; collapsed.clear(); refreshForGame(); };
    el.appendChild(t);
  }
}

// Ripopola set-filter + totale per il gioco attivo, poi ridisegna.
function refreshForGame(){
  buildGameTabs();
  const mine = SETS.filter(s=>s.game===activeGame);
  const sel=document.getElementById("setFilter");
  sel.innerHTML='<option value="">Tutti i set</option>';
  mine.forEach(s=>{ const o=document.createElement("option"); o.value=o.textContent=s.name; sel.appendChild(o); });
  const gt={};
  mine.forEach(s=> s.sources.forEach(src=>{ gt[src]=(gt[src]||0)+(s.totals[src]||0); }));
  const gparts=SRC_ORDER.filter(src=>src in gt).map(src=>
    `${SRC_META[src].name} <span style="color:var(--${SRC_META[src].cls});font-weight:700">${YEN(gt[src])}</span>`);
  document.getElementById("grand").innerHTML = gparts.length ? "Totale — "+gparts.join(" · ") : "";
  render();
}

function buildSets(){
  const map=new Map();
  for(const r of DATA){
    if(!map.has(r.set_name)) map.set(r.set_name,{name:r.set_name,order:r.set_order,cards:[]});
    map.get(r.set_name).cards.push(r);
  }
  SETS=[...map.values()].sort((a,b)=>(a.order-b.order)||a.name.localeCompare(b.name));
  for(const s of SETS){
    s.game = (s.cards[0]||{}).game || null; // il set appartiene a un gioco
    s.sources = setSources(s);              // fonti presenti in questo set
    s.totals = {};
    for(const src of s.sources)
      s.totals[src] = s.cards.reduce((a,c)=>a+(priceOf(c,src)||0),0);
    for(const c of s.cards){
      c._w = {};
      for(const src of s.sources){
        const p=priceOf(c,src), tot=s.totals[src];
        c._w[src] = (p && tot) ? p/tot*100 : null;
      }
    }
  }
}

function priceRow(tag, cls, val, stock, weight){
  const stale = stock===0 && val;
  const v = (val==null||val===0) ? '<span class="val">—</span>'
          : `<span class="val">${YEN(val)}${stale?'<span class="mk" title="Prezzo riportato/non confermato">&nbsp;*</span>':''}</span>`;
  const w = weight==null ? '' : `<span class="w">${PCT(weight)}</span>`;
  const bar = weight==null ? '' : `<div class="bar"><i class="${cls}" style="width:${Math.min(weight,100)}%"></i></div>`;
  return `<div><div class="prow ${stale?'stale':''}"><span class="tag ${cls}">${tag}</span>${v}${w}</div>${bar}</div>`;
}

function render(){
  const cont=document.getElementById("sets"); cont.innerHTML="";
  const query=qval(), sf=setFilter();
  let shown=0;
  for(const s of SETS){
    if(activeGame && s.game!==activeGame) continue;   // solo il gioco attivo
    if(sf && s.name!==sf) continue;
    const cards = s.cards.filter(c=> !query ||
      (c.name_en||"").toLowerCase().includes(query) ||
      (c.full_name||"").toLowerCase().includes(query) ||
      (c.card_code||"").toLowerCase().includes(query));
    if(!cards.length) continue;
    shown++;
    const isCol = collapsed.has(s.name);

    const totHtml = s.sources.map(src=>
      `<div><span class="lbl">${SRC_META[src].name}</span><span class="${SRC_META[src].cls}">${YEN(s.totals[src])}</span></div>`).join("");
    const head=document.createElement("div"); head.className="set-head";
    head.innerHTML =
      `<span class="caret">${isCol?'▸':'▾'}</span>
       <h2>${esc(s.name)}</h2><span class="count">${s.cards.length} carte</span>
       <div class="set-tot">${totHtml}</div>
       <button class="idxbtn" title="Andamento prezzo del set">📈</button>`;
    head.onclick=()=>{ collapsed.has(s.name)?collapsed.delete(s.name):collapsed.add(s.name); render(); };
    const ib=head.querySelector(".idxbtn");
    if(SETIDX.sets[s.name]) ib.onclick=(e)=>{ e.stopPropagation(); openIndex(s.name); };
    else ib.style.display="none";
    cont.appendChild(head);
    if(isCol) continue;

    const grid=document.createElement("div"); grid.className="grid";
    for(const c of cards){
      const tile=document.createElement("div"); tile.className="tile";
      tile.innerHTML =
        `<div class="imgbox"><img loading="lazy" src="${imgSrc(c)}" alt="" onerror="this.style.visibility='hidden'"></div>
         <div class="body">
           <div class="nm" title="${esc(c.full_name)}">${esc(c.name_en||c.full_name)}</div>
           <div class="meta"><span class="code">${esc(c.card_code)}</span>${c.rarity?`<span class="rar">${esc(c.rarity)}</span>`:''}</div>
           <div class="prices">
             ${s.sources.map(src=>priceRow(SRC_META[src].tag,SRC_META[src].cls,priceOf(c,src),stockOf(c,src),(c._w||{})[src])).join("")}
           </div>
         </div>`;
      tile.onclick=()=>openChart(c);
      grid.appendChild(tile);
    }
    cont.appendChild(grid);
  }
  document.getElementById("empty").hidden = shown>0;
}

function openChart(c){
  idxName=null;
  const img=document.getElementById("mImg"); img.style.display=""; img.src=imgSrc(c);
  document.getElementById("mToggle").hidden=true;
  document.getElementById("mName").textContent = c.name_en||c.full_name||c.card_code;
  document.getElementById("mSub").textContent = `${c.full_name||""} · ${c.card_code}${c.rarity?' · '+c.rarity:''}`;
  document.getElementById("modal").classList.add("on");
  drawChart(document.getElementById("mCanvas"), c.card_id);
}

function openIndex(name){
  const entry = name==="__GLOBAL__" ? SETIDX.global : (SETIDX.sets||{})[name];
  if(!entry || (!entry.cardrush && !entry.hareruya)) return;
  idxName=name;
  document.getElementById("mImg").style.display="none";
  const tg=document.getElementById("mToggle"); tg.hidden=false; tg.textContent = idxNormalize?"Mostra ¥":"Indice 100";
  document.getElementById("mName").textContent = name==="__GLOBAL__" ? "Andamento generale" : name;
  document.getElementById("mSub").textContent = "Indice di prezzo ponderato" + (name==="__GLOBAL__" ? " (tutti i set)" : " del set");
  document.getElementById("modal").classList.add("on");
  drawIndexChart(document.getElementById("mCanvas"), entry, idxNormalize);
}

function closeModal(){ document.getElementById("modal").classList.remove("on"); if(chart){chart.destroy();chart=null;} }
document.getElementById("mClose").onclick = closeModal;
document.getElementById("modal").onclick = e=>{ if(e.target.id==="modal") closeModal(); };

// legenda dinamica: mostra solo le fonti effettivamente presenti nei dati
function setLegend(srcs){
  document.getElementById("mLegend").innerHTML = srcs.map(src=>
    `<span><span class="dot" style="background:${SRC_META[src].color}"></span>${SRC_META[src].name}</span>`).join("");
}

function drawChart(canvas, cardId){
  const s=HIST[String(cardId)]||{};
  const srcs=SRC_ORDER.filter(x=>s[x] && s[x].length);
  setLegend(srcs);
  const days=[...new Set(srcs.flatMap(x=>s[x].map(p=>p[0])))].sort();
  const map=arr=>{const m=Object.fromEntries((arr||[]).map(p=>[p[0],p[1]]));return days.map(d=>m[d]??null);};
  if(chart) chart.destroy();
  chart=new Chart(canvas,{type:"line",
    data:{labels:days,datasets:srcs.map(src=>(
      {label:SRC_META[src].name,data:map(s[src]),borderColor:SRC_META[src].color,spanGaps:true,tension:.25,pointRadius:3}))},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${YEN(c.parsed.y)}`}}},
      scales:{x:{ticks:{color:"#8b94ad"},grid:{color:"#27304a"}},
              y:{ticks:{color:"#8b94ad",callback:v=>"¥"+v.toLocaleString("ja-JP")},grid:{color:"#27304a"}}}}
  });
}

function drawIndexChart(canvas, entry, normalize){
  const srcs=SRC_ORDER.filter(x=>entry[x] && entry[x].length);
  setLegend(srcs);
  const days=[...new Set(srcs.flatMap(x=>entry[x].map(p=>p[0])))].sort();
  const series=arr=>{
    const m=Object.fromEntries((arr||[]).map(p=>[p[0],p[1]]));
    let vals=days.map(d=>m[d]??null);
    if(normalize){ const base=vals.find(v=>v!=null); vals=vals.map(v=> v==null?null : +(v/base*100).toFixed(1)); }
    return vals;
  };
  if(chart) chart.destroy();
  chart=new Chart(canvas,{type:"line",
    data:{labels:days,datasets:srcs.map(src=>(
      {label:SRC_META[src].name,data:series(entry[src]),borderColor:SRC_META[src].color,spanGaps:true,tension:.25,pointRadius:3}))},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${normalize?c.parsed.y:("¥"+Number(c.parsed.y).toLocaleString("ja-JP"))}`}}},
      scales:{x:{ticks:{color:"#8b94ad"},grid:{color:"#27304a"}},
              y:{ticks:{color:"#8b94ad",callback:v=>normalize?v:"¥"+v.toLocaleString("ja-JP")},grid:{color:"#27304a"}}}}
  });
}

document.getElementById("globalIdxBtn").onclick=()=>openIndex("__GLOBAL__");
document.getElementById("mToggle").onclick=()=>{ idxNormalize=!idxNormalize; if(idxName) openIndex(idxName); };
document.getElementById("search").oninput = render;
document.getElementById("setFilter").onchange = render;
document.getElementById("refreshBtn").onclick = async (e)=>{
  const btn=e.currentTarget, msg=document.getElementById("refreshMsg");
  btn.disabled=true; msg.textContent="Avvio in corso…";
  try{
    const r=await fetch("/api/trigger",{method:"POST"});
    const j=await r.json().catch(()=>({}));
    if(r.ok && j.ok){ msg.textContent="✓ Avviato — i prezzi compariranno tra ~7-8 minuti (ricarica più tardi)."; }
    else{ msg.textContent="✗ "+(j.error||("Errore "+r.status)); btn.disabled=false; }
  }catch(err){ msg.textContent="✗ Errore di rete"; btn.disabled=false; }
};
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
load();
</script>
</body>
</html>
